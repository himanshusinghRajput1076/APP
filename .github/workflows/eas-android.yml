name: Automatic Android APK

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/eas-android.yml"
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android APK with EAS
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Build Android APK
        env:
          EXPO_PUBLIC_BACKEND_URL: ${{ secrets.EXPO_PUBLIC_BACKEND_URL }}
        run: |
          eas build --platform android --profile preview --non-interactive --wait
